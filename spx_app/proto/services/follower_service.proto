syntax = "proto3";

package spanner.paxos.services;

import "google/protobuf/timestamp.proto";

// A service exposing APIs that allow invoking a follower to perform actions according to the Paxos protocol
service FollowerService {
    // Replicate a write log entry
    rpc ReplicateWrite (ReplicateWriteRequest) returns (ReplicateWriteResponse);

    // Commit a write log entry
    rpc CommitWrite (CommitWriteRequest) returns (CommitWriteResponse);
}

message ReplicateWriteRequest {
    // The term (ballot) number of leader who sent the write request
    uint32 term_number = 1;

    // The slot number of the log entry
    uint32 slot_number = 2;

    // The payload of the log entry
    string payload = 3;

    // The timestamp assigned to the log entry by the leader
    google.protobuf.Timestamp write_time = 4;

    // The lease expiration time of the leader
    google.protobuf.Timestamp lease_expiry_time = 5;
}

message ReplicateWriteResponse {}

message CommitWriteRequest {
    // The term (ballot) number of leader who sent the commit request
    uint32 term_number = 1;

    // The slot number of the log entry to be committed
    uint32 commit_index = 2;
}

message CommitWriteResponse {}
